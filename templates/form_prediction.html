{% extends "base.html" %}

{% block content %}
<div class="landing-container">
    <div class="form-container">
        <div class="form-header">
            <h2>✨ Employee Attrition Prediction</h2>
            <p>Masukkan data karyawan di bawah ini untuk mendapatkan prediksi risiko attrition.</p>
        </div>

        <form action="/predict" method="POST" class="prediction-form">
            <div class="form-section">
                <div class="form-grid">
                    <div class="input-group">
                        <label>Umur (Age)</label>
                        <input type="number" name="Age" placeholder="Contoh: 30" required>
                    </div>
                    <div class="input-group">
                        <label>Pendapatan Bulanan ($)</label>
                        <input type="number" name="MonthlyIncome" placeholder="Contoh: 5000">
                    </div>
                    <div class="input-group">
                        <label>Lembur (OverTime)</label>
                        <select name="OverTime">
                            <option value="" disabled selected>Pilih Opsi</option>
                            <option value="Yes">Ya</option>
                            <option value="No">Tidak</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Job Level (1-5)</label>
                        <select name="JobLevel">
                            <option value="" disabled selected>Pilih Job Level</option>
                            <option value="1">Level 1</option>
                            <option value="2">Level 2</option>
                            <option value="3">Level 3</option>
                            <option value="4">Level 4</option>
                            <option value="5">Level 5</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Total Pengalaman Kerja (Tahun)</label>
                        <input type="number" name="TotalWorkingYears">
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <button type="reset" class="btn-secondary">Reset Data</button>
                <button type="submit" class="btn-submit">Analisis Sekarang</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
